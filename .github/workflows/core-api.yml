name: Core API CI

on:
  push:
    branches: [main]
    paths:
      - 'core-api/**'
      - '.github/workflows/core-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core-api/**'

defaults:
  run:
    working-directory: core-api

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: supportgpt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: core-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supportgpt_test

      - name: Unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/supportgpt_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Build
        run: npm run build
